<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTV - ARPS Video Cassette Player Control</title>
    <link rel="stylesheet" href="css/style.css?v=2">
</head>

<body>

    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div id="logo-container">
                <!-- OTV logo injected via CSS background or img tag -->
                <img src="ARPS/SVG/OTV logo.svg" alt="OTV Logo" id="otv-logo">
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" autocomplete="off" required>
                <input type="password" id="password" placeholder="Password" autocomplete="off" required>
                <button type="submit">LOGIN</button>
                <div id="login-error" class="hidden">Invalid credentials.</div>
            </form>

            <!-- Entering animation container -->
            <div id="entering-animation" class="hidden">
                <img src="ARPS/SVG/entering arps 331.svg" alt="Entering ARPS">
            </div>
        </div>
    </div>

    <!-- Main Application Screen -->
    <div id="app-screen" class="screen hidden">
        <div class="app-container">

            <!-- Control Panel (Left) -->
            <div id="control-panel">
                <img src="ARPS/SVG/OTV logo.svg" class="user-mode-logo" alt="OTV Logo">
                <img src="ARPS/SVG/APRS.svg" class="user-mode-logo" alt="ARPS Logo">
                <div class="control-btn complex-btn" id="btn-swap">
                    <!-- absolute children controlled via native scale CSS -->
                    <img src="ARPS/SVG/buttonBKground.svg" class="btn-bg" alt="Background">
                    <img src="ARPS/SVG/ACOUP.svg" class="btn-up" alt="Swap">
                    <img src="ARPS/SVG/ACODOWN.svg" class="btn-down hidden" alt="Swap Down">
                    <img src="ARPS/SVG/ButtonFrame.svg" class="btn-frame" alt="Frame">
                </div>

                <!-- Admin Controls (Hidden in User Mode) -->
                <div class="control-btn" id="btn-play">
                    <img src="ARPS/SVG/PLAYUP.svg" class="btn-up" alt="Play">
                    <img src="ARPS/SVG/PLAYDOWN.svg" class="btn-down hidden" alt="Play Down">
                </div>
                <div class="control-btn" id="btn-pause">
                    <img src="ARPS/SVG/PAUSEUP.svg" class="btn-up" alt="Pause">
                    <img src="ARPS/SVG/PAUSEDOWN.svg" class="btn-down hidden" alt="Pause Down">
                </div>
                <div class="control-btn" id="btn-stop">
                    <img src="ARPS/SVG/STOPUP.svg" class="btn-up" alt="Stop">
                    <img src="ARPS/SVG/STOPDOWN.svg" class="btn-down hidden" alt="Stop Down">
                </div>
            </div>

            <!-- Device Panel (Right) -->
            <div id="device-panel">
                <!-- Hub, Grid, Arm, Library -->
                <img src="ARPS/SVG/MovementGridSQ.svg" id="movement-grid" alt="Grid" class="static-bg">
                <img src="ARPS/SVG/Hub.svg" id="hub" alt="Hub" class="static-bg">
                <img src="ARPS/SVG/TapeDeck.svg" id="tape-deck" alt="Library" class="static-bg">

                <div id="arm-container">
                    <div id="arm-rotator">
                        <img src="ARPS/SVG/ArmRetracted_open.svg" id="arm-retracted-open-0" class="arm-part rot-0"
                            alt="retracted open 0">
                        <img src="ARPS/SVG/ArmRetracted_open.svg" id="arm-retracted-open-180" class="arm-part rot-180"
                            alt="retracted open 180">

                        <img src="ARPS/SVG/ArmExtended_open.svg" id="arm-extended-open-0" class="arm-part rot-0 hidden"
                            alt="extended open 0">
                        <img src="ARPS/SVG/ArmExtended_closed.svg" id="arm-extended-closed-0"
                            class="arm-part rot-0 hidden" alt="extended closed 0">

                        <img src="ARPS/SVG/ArmExtended_open.svg" id="arm-extended-open-180"
                            class="arm-part rot-180 hidden" alt="extended open 180">
                        <img src="ARPS/SVG/ArmExtended_closed.svg" id="arm-extended-closed-180"
                            class="arm-part rot-180 hidden" alt="extended closed 180">

                        <img src="ARPS/SVG/TapeCassette_pick.svg" id="tape-cassette-pick-0"
                            class="arm-part rot-0 hidden" alt="tape pick 0">
                        <img src="ARPS/SVG/TapeCassette_pick.svg" id="tape-cassette-pick-180"
                            class="arm-part rot-180 hidden" alt="tape pick 180">
                    </div>
                </div>

                <img src="ARPS/SVG/ArmFAULT.svg" id="arm-fault" class="hidden" alt="Arm Fault">
            </div>

            <!-- Cassette Queue Overlay (Bottom) -->
            <div id="cassette-queue">
                <!-- 8 Cassettes will be generated by JS -->
            </div>

        </div>
    </div>

    <script src="js/app.js?v=2"></script>
</body>

</html>
