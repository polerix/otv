<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>otv - ARPS Video Cassette Player Control</title>
    <link rel="stylesheet" href="css/style.css?v=2">
</head>

<body>

    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div id="logo-container">
                <!-- otv logo injected via CSS background or img tag -->
                <img src="ARPS/SVG/OTV-Logo.svg" alt="otv Logo" id="otv-logo">
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" autocomplete="off" required>
                <input type="password" id="password" placeholder="Password" autocomplete="off" required>
                <button type="submit">LOGIN</button>
                <div id="login-error" class="hidden">Invalid credentials.</div>
            </form>

            <!-- Entering animation container -->
            <div id="entering-animation" class="hidden">
                <img src="ARPS/SVG/Entering-ARPS.svg" alt="Entering ARPS">
            </div>
        </div>
    </div>

    <!-- Main Application Screen -->
    <div id="app-screen" class="screen hidden">
        <div class="app-container">

            <!-- Control Panel (Left) -->
            <div id="control-panel" class="admin-collapsed">
                <img src="ARPS/SVG/OTV-Logo.svg" class="user-mode-logo" alt="otv Logo">
                <img src="ARPS/SVG/ARPS.svg" class="user-mode-logo" alt="ARPS Logo">
                <div class="control-btn complex-btn" id="btn-swap">
                    <!-- absolute children controlled via native scale CSS -->
                    <img src="ARPS/SVG/buttonBKground.svg" class="btn-bg" alt="Background">
                    <img src="ARPS/SVG/ACOUP.svg" class="btn-up" alt="Swap">
                    <img src="ARPS/SVG/ACODOWN.svg" class="btn-down hidden" alt="Swap Down">
                    <img src="ARPS/SVG/ButtonFrame.svg" class="btn-frame" alt="Frame">
                </div>

                <!-- Admin Controls (3 Rows) -->
                <div class="admin-controls-wrapper">
                    <div class="control-row">
                        <div class="control-btn complex-btn btn-admin btn-mini" id="btn-play">
                            <img src="ARPS/SVG/buttonBKground.svg" class="btn-bg" alt="Background">
                            <img src="ARPS/SVG/PLAYUP.svg" class="btn-up" alt="Play">
                            <img src="ARPS/SVG/PLAYDOWN.svg" class="btn-down hidden" alt="Play Down">
                            <img src="ARPS/SVG/ButtonFrame.svg" class="btn-frame" alt="Frame">
                        </div>
                        <div class="control-btn complex-btn btn-admin btn-mini" id="btn-stop">
                            <img src="ARPS/SVG/buttonBKground.svg" class="btn-bg" alt="Background">
                            <img src="ARPS/SVG/STOPUP.svg" class="btn-up" alt="Stop">
                            <img src="ARPS/SVG/STOPDOWN.svg" class="btn-down hidden" alt="Stop Down">
                            <img src="ARPS/SVG/ButtonFrame.svg" class="btn-frame" alt="Frame">
                        </div>
                    </div>

                    <div class="control-row">
                        <div class="control-btn complex-btn btn-admin btn-mini" id="btn-swap-control">
                            <img src="ARPS/SVG/buttonBKground.svg" class="btn-bg" alt="Background">
                            <img src="ARPS/SVG/SWAPUP.svg" class="btn-up" alt="Swap">
                            <img src="ARPS/SVG/SWAPDOWN.svg" class="btn-down hidden" alt="Swap Down">
                            <img src="ARPS/SVG/ButtonFrame.svg" class="btn-frame" alt="Frame">
                        </div>
                        <div class="control-btn complex-btn btn-admin btn-mini" id="btn-pause">
                            <img src="ARPS/SVG/buttonBKground.svg" class="btn-bg" alt="Background">
                            <img src="ARPS/SVG/PAUSEUP.svg" class="btn-up" alt="Pause">
                            <img src="ARPS/SVG/PAUSEDOWN.svg" class="btn-down hidden" alt="Pause Down">
                            <img src="ARPS/SVG/ButtonFrame.svg" class="btn-frame" alt="Frame">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Device Panel (Right) -->
            <div id="device-panel">
                <!-- Hub, Grid, Arm, Library -->
                <img src="ARPS/SVG/MovementGridSQ.svg" id="movement-grid" alt="Grid" class="static-bg">
                <img src="ARPS/SVG/Hub.svg" id="hub" alt="Hub" class="static-bg">
                <img src="ARPS/SVG/TapeDeck.svg" id="tape-deck" alt="Library" class="static-bg">

                <div id="arm-container">
                    <div id="arm-rotator">
                        <div id="arm-0" class="arm-side rot-0">
                            <img src="ARPS/SVG/ArmRetracted_open.svg" id="arm-retracted-open-0" class="arm-part" alt="retracted open 0">
                            <img src="ARPS/SVG/ArmRetracted_closed.svg" id="arm-retracted-closed-0" class="arm-part hidden" alt="retracted closed 0">
                            <img src="ARPS/SVG/ArmExtended_open.svg" id="arm-extended-open-0" class="arm-part hidden" alt="extended open 0">
                            <img src="ARPS/SVG/ArmExtended_closed.svg" id="arm-extended-closed-0" class="arm-part hidden" alt="extended closed 0">
                            <img src="ARPS/SVG/TapeCassette_pick.svg" id="tape-cassette-pick-0" class="arm-part hidden" alt="tape pick 0">
                        </div>
                        <div id="arm-180" class="arm-side rot-180">
                            <img src="ARPS/SVG/ArmRetracted_open.svg" id="arm-retracted-open-180" class="arm-part" alt="retracted open 180">
                            <img src="ARPS/SVG/ArmRetracted_closed.svg" id="arm-retracted-closed-180" class="arm-part hidden" alt="retracted closed 180">
                            <img src="ARPS/SVG/ArmExtended_open.svg" id="arm-extended-open-180" class="arm-part hidden" alt="extended open 180">
                            <img src="ARPS/SVG/ArmExtended_closed.svg" id="arm-extended-closed-180" class="arm-part hidden" alt="extended closed 180">
                            <img src="ARPS/SVG/TapeCassette_pick.svg" id="tape-cassette-pick-180" class="arm-part hidden" alt="tape pick 180">
                        </div>
                    </div>
                </div>

                <img src="ARPS/SVG/ArmFAULT.svg" id="arm-fault" class="hidden" alt="Arm Fault">
            </div>

            <!-- Cassette Queue Overlay (Bottom) -->
            <div id="cassette-queue">
                <!-- 8 Cassettes will be generated by JS -->
            </div>

            <!-- Info Modal / Pop-up (Moved outside dynamic container) -->
            <div id="modal-overlay" class="modal-backdrop hidden">
                <div class="info-modal">
                    <span class="close-btn" id="modal-close-x">&times;</span>
                    <h2 id="modal-title">Cassette Info</h2>
                    <div class="modal-content">
                        <p><span class="label-tag">Content:</span> <span id="modal-sublabel">-</span></p>
                        <p><span class="label-tag">Duration:</span> <span id="modal-duration">-</span></p>
                        <p><span class="label-tag">Scheduled:</span> <span id="modal-scheduled">-</span></p>
                        <p><span class="label-tag">Time Until:</span> <span id="modal-timeleft">-</span></p>
                    </div>
                </div>
            </div>

            <!-- Library Search Modal -->
            <div id="library-modal" class="modal-backdrop hidden">
                <div class="info-modal">
                    <span class="close-btn" id="library-close-x">&times;</span>
                    <h2>LIBRARY</h2>
                    
                    <div class="library-nav">
                        <div class="category-tab" data-cat="Movies">Movies</div>
                        <div class="category-tab" data-cat="Shows">Shows</div>
                        <div class="category-tab" data-cat="Videos">Videos</div>
                        <div class="category-tab" data-cat="Ads">Ads</div>
                        <div class="category-tab" data-cat="Station ID">Station ID</div>
                        <div class="category-tab" data-cat="Music Videos">Music Videos</div>
                        <div class="category-tab" data-cat="News">News</div>
                    </div>

                    <input type="text" id="search-input" placeholder="Search Filter...">
                    
                    <div id="search-results">
                        <!-- Results injected by JS -->
                    </div>
                    <div class="modal-footer">
                        <button class="admin-action-btn" id="btn-select-media" disabled>Select</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>window.OTC_HOST = 'http://localhost:9090';</script>
    <script src="js/obstricloner-client.js"></script>
    <script src="js/app.js?v=2"></script>
</body>

</html>
